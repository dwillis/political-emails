name: Collect Emails

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10am UTC (6am ET)
  workflow_dispatch:
    inputs:
      since:
        description: 'Override: fetch since this date (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Collect new emails
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          cd scripts
          if [ -n "${{ github.event.inputs.since }}" ]; then
            uv run python collect_emails.py --since "${{ github.event.inputs.since }}"
          else
            uv run python collect_emails.py
          fi

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ state/
          if git diff --staged --quiet; then
            echo "No new emails"
          else
            DATE=$(date +%Y-%m-%d)
            NEW=$(git diff --staged --numstat data/ | awk '{s+=$1} END {print s+0}')
            git commit -m "Update emails ${DATE} (+${NEW} lines)"
            git push
          fi
